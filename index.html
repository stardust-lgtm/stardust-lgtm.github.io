<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>terminal.stardust-lgtm.github.io</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #c9d1d9; --muted: #6e7681;
    --green: #56d364; --cyan: #39d0d8; --yellow: #e3b341;
    --red: #ff7b72; --blue: #79c0ff; --purple: #bc8cff; --orange: #ffa657;
  }
  html, body {
    height: 100%; background: radial-gradient(ellipse at center, #0d1f0d 0%, #000 70%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace; padding: 20px; min-height: 100vh;
  }
  .window {
    width: 100%; max-width: 900px; min-height: 540px;
    background: var(--bg); border-radius: 12px; border: 1px solid var(--border);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.05), 0 25px 80px rgba(0,0,0,0.8),
      0 0 60px rgba(86,211,100,0.04), inset 0 1px 0 rgba(255,255,255,0.05);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .titlebar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 16px; display: flex; align-items: center; gap: 8px;
    border-radius: 12px 12px 0 0; flex-shrink: 0;
  }
  .dots { display: flex; gap: 7px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; transition: filter 0.15s; }
  .dot:hover { filter: brightness(1.3); }
  .dot.red    { background: #ff5f57; border: 1px solid #e04e46; }
  .dot.yellow { background: #febc2e; border: 1px solid #d9a227; }
  .dot.green  { background: #28c840; border: 1px solid #1faa34; }
  .titlebar-label { flex: 1; text-align: center; font-size: 12px; color: var(--muted); letter-spacing: 0.05em; }
  .terminal {
    flex: 1; padding: 20px 24px; overflow-y: auto; overflow-x: hidden;
    cursor: text; scroll-behavior: smooth;
  }
  .terminal::-webkit-scrollbar { width: 6px; }
  .terminal::-webkit-scrollbar-track { background: transparent; }
  .terminal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .output-block { margin-bottom: 2px; line-height: 1.65; font-size: 13.5px; }
  .output-block.spacer { height: 6px; }
  .c-green { color: var(--green); } .c-cyan { color: var(--cyan); }
  .c-yellow { color: var(--yellow); } .c-red { color: var(--red); }
  .c-blue { color: var(--blue); } .c-purple { color: var(--purple); }
  .c-orange { color: var(--orange); } .c-muted { color: var(--muted); }
  .c-text { color: var(--text); } .bold { font-weight: 700; }
  a { color: var(--orange); text-decoration: underline; text-underline-offset: 3px; }
  a:hover { color: var(--yellow); }
  .ascii-art {
    font-size: 9.5px; line-height: 1.22; color: var(--green); white-space: pre;
    margin-bottom: 8px; font-weight: 500;
    animation: glow 3s ease-in-out infinite;
  }
  .sep { color: var(--muted); }
  .prompt-line { display: flex; align-items: center; font-size: 13.5px; margin-top: 4px; min-height: 22px; }
  .prompt-user { color: var(--green); font-weight: 700; }
  .prompt-at { color: var(--muted); }
  .prompt-host { color: var(--cyan); font-weight: 700; }
  .prompt-sep { color: var(--muted); }
  .prompt-dir { color: var(--blue); font-weight: 500; }
  .prompt-dollar { color: var(--muted); margin: 0 6px 0 4px; }
  .input-row {
    display: flex; align-items: center; padding: 8px 24px 20px;
    font-size: 13.5px; flex-shrink: 0;
    border-top: 1px solid rgba(48,54,61,0.4); margin-top: 4px;
  }
  .input-prompt { white-space: nowrap; flex-shrink: 0; }
  #cmd-input {
    flex: 1; background: transparent; border: none; outline: none;
    font-family: inherit; font-size: 13.5px; color: var(--text); caret-color: var(--green);
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(2px)} to{opacity:1;transform:none} }
  .fade-in { animation: fadeIn 0.12s ease forwards; }
  @keyframes glow {
    0%,100% { text-shadow: 0 0 8px rgba(86,211,100,0.2); }
    50% { text-shadow: 0 0 18px rgba(86,211,100,0.5), 0 0 30px rgba(86,211,100,0.2); }
  }
  /* Welcome grid */
  .welcome-grid { display: flex; gap: 28px; align-items: flex-start; margin: 4px 0; }
  .welcome-left { flex: 1; min-width: 0; }
  .welcome-right { flex-shrink: 0; }
  .ascii-portrait {
    font-size: 9px; line-height: 1.18; color: var(--green); white-space: pre;
    font-family: 'JetBrains Mono', monospace;
    text-shadow: 0 0 8px rgba(86,211,100,0.25);
    opacity: 0.9; letter-spacing: 0.01em;
    animation: glow 3s ease-in-out infinite;
  }
  /* Help table */
  .cmd-row { display: flex; gap: 0; margin: 1px 0; font-size: 13.5px; }
  .cmd-name-col { color: var(--yellow); width: 140px; flex-shrink: 0; }
  .cmd-args-col { color: var(--cyan); width: 90px; flex-shrink: 0; }
  .cmd-desc-col { color: var(--text); }
  /* Skills */
  .skill-row { display: flex; align-items: center; gap: 10px; margin: 3px 0; font-size: 13px; }
  .skill-name { color: var(--text); width: 160px; flex-shrink: 0; }
  .skill-bar-bg { flex: 1; height: 6px; background: var(--border); border-radius: 3px; max-width: 200px; }
  .skill-bar-fill { height: 100%; border-radius: 3px; transition: width 0.7s ease; }
  .skill-pct { color: var(--muted); font-size: 12px; width: 38px; text-align: right; }
  /* Projects */
  .project-card {
    border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 14px; margin: 6px 0; background: rgba(255,255,255,0.02);
  }
  .project-title { color: var(--blue); font-weight: 700; font-size: 13.5px; }
  .project-tech { color: var(--purple); font-size: 12px; margin: 3px 0; }
  .project-desc { color: var(--text); font-size: 13px; }
  .project-links { margin-top: 5px; font-size: 12px; }
  /* Contact */
  .contact-row { display: flex; gap: 12px; align-items: center; margin: 3px 0; font-size: 13.5px; }
  .contact-icon { color: var(--green); width: 20px; flex-shrink: 0; }
  .contact-label { color: var(--muted); width: 90px; }
  /* Badge */
  .badge { display: inline-block; padding: 1px 7px; border-radius: 999px; font-size: 11px; margin-left: 6px; }
  .badge-green { background: rgba(86,211,100,0.15); color: var(--green); border: 1px solid rgba(86,211,100,0.3); }
</style>
</head>
<body>
<div class="window">
  <div class="titlebar">
    <div class="dots">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
    </div>
    <div class="titlebar-label">❯&nbsp;&nbsp;stardust-lgtm.github.io</div>
    <div style="width:52px"></div>
  </div>
  <div class="terminal" id="terminal" onclick="focusInput()">
    <div id="output"></div>
  </div>
  <div class="input-row">
    <div class="input-prompt">
      <span class="prompt-user">visitor</span><span class="prompt-at">@</span><span class="prompt-host">stardust-lgtm.github.io</span><span class="prompt-sep">:</span><span class="prompt-dir">~</span><span class="prompt-dollar">$</span>
    </div>
    <input id="cmd-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" autofocus placeholder="type a command…">
  </div>
</div>

const output = document.getElementById('output');
const input  = document.getElementById('cmd-input');
const term   = document.getElementById('terminal');
let history = [], histIdx = -1;

function focusInput() { input.focus(); }
function scrollBottom() { term.scrollTop = term.scrollHeight; }

function line(html, cls) {
  const d = document.createElement('div');
  d.className = 'output-block fade-in' + (cls ? ' ' + cls : '');
  d.innerHTML = html;
  output.appendChild(d);
  scrollBottom();
  return d;
}
function spacer() { line('', 'spacer'); }
function sep() { line('<span class="sep">────────────────────────────────────────────────────</span>'); }
function promptEcho(cmd) {
  line('<span class="prompt-user">visitor</span><span class="prompt-at">@</span><span class="prompt-host">stardust-lgtm.github.io</span><span class="prompt-sep">:</span><span class="prompt-dir">~</span><span class="prompt-dollar" style="margin:0 6px 0 4px">$</span><span style="color:var(--yellow)">' + escHtml(cmd) + '</span>');
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function run(raw) {
  const trimmed = raw.trim();
  if (!trimmed) return;
  history.unshift(trimmed);
  histIdx = -1;
  promptEcho(trimmed);
  const parts = trimmed.split(/\s+/);
  const cmd = parts[0].toLowerCase();
  const args = parts.slice(1).join(' ');
  if (cmd === 'echo') {
    spacer();
    line('<span class="c-text">' + escHtml(args || 'Usage: echo [text]') + '</span>');
    spacer();
  } else if (COMMANDS[cmd]) {
    COMMANDS[cmd](args);
  } else {
    spacer();
    line('<span class="c-red">bash: ' + escHtml(cmd) + ': command not found</span>');
    line('<span class="c-muted">Type <span class="c-yellow">`help`</span> for available commands.</span>');
    spacer();
  }
}

input.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const val = input.value; input.value = ''; run(val);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx < history.length - 1) { histIdx++; input.value = history[histIdx]; }
    setTimeout(function() { input.selectionStart = input.selectionEnd = input.value.length; }, 0);
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx > 0) { histIdx--; input.value = history[histIdx]; }
    else { histIdx = -1; input.value = ''; }
  } else if (e.key === 'Tab') {
    e.preventDefault();
    const val = input.value.toLowerCase().trim();
    const match = Object.keys(COMMANDS).find(function(k) { return k.startsWith(val) && k !== val; });
    if (match) input.value = match;
  } else if (e.key === 'l' && e.ctrlKey) {
    e.preventDefault(); run('clear');
  }
});
